version: '3'
services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2
    networks:
      - proxy-net

  app1:
    image: nginx:alpine
    volumes:
      - ./app1:/usr/share/nginx/html
    networks:
      - proxy-net

  app2:
    image: nginx:alpine
    volumes:
      - ./app2:/usr/share/nginx/html
    networks:
      - proxy-net

networks:
  proxy-net:
